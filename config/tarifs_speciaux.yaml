# tarifs_speciaux.yaml
# Tarifs spéciaux pour le PAIEMENT AU PROF (pas la facture client)
#
# Le tarif normal vient de secrets.yaml (pay_rate)
# Ici on définit les EXCEPTIONS par élève/famille
#
# Format:
#   - teacher: "Nom du prof"
#     parent: "Nom du parent"     (pour matcher sur la famille)
#     student: "Nom de l'élève"   (optionnel, alternative à parent)
#     pay_rate: 40                (tarif horaire pour le prof)
#
# Exemple : Jabrane reçoit normalement 25 EUR/h (secrets.yaml)
#           Mais avec Nikitina Anna, il reçoit 40 EUR/h

tarifs_speciaux:
  # Jabrane Karkouri avec Nikitina Anna = 40 EUR/h (au lieu de 25 EUR)
  - teacher: "Jabrane Karkouri"
    parent: "Nikitina Anna"
    pay_rate: 40